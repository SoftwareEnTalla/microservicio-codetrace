services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - entalla-net
      - shared-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  entalla-net:
    driver: bridge
  shared-net:
    external: true
